<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LWF design sprint collaboration board</title>
<desc>Miro-style board with alert assignment flow at top, research insights and design decisions as sticky notes below</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <pattern id="d" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.75" fill="#C4C0B9"/>
  </pattern>
</defs>
<rect width="680" height="400" fill="#ECEBE8"/>
<rect width="680" height="400" fill="url(#d)"/>
<rect x="16" y="16" width="648" height="104" rx="5" fill="#FFFFFF" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="28" y="33" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#8C8980" font-weight="500">Alert assignment flow</text>
<rect x="28" y="46" width="100" height="44" rx="4" fill="#F7F6F4" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="78" y="73" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B26" text-anchor="middle">Alert fires</text>
<line x1="128" y1="68" x2="152" y2="68" stroke="#B8B5AE" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="154" y="46" width="100" height="44" rx="4" fill="#F7F6F4" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="204" y="73" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B26" text-anchor="middle">Op reviews</text>
<line x1="254" y1="68" x2="278" y2="68" stroke="#B8B5AE" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="280" y="46" width="100" height="44" rx="4" fill="#1A4FFF"/>
<text x="330" y="73" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="500">Assign alert</text>
<ellipse cx="330" cy="68" rx="64" ry="28" fill="none" stroke="#E85030" stroke-width="1.25" stroke-dasharray="5 3"/>
<line x1="380" y1="68" x2="404" y2="68" stroke="#B8B5AE" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="406" y="46" width="100" height="44" rx="4" fill="#F7F6F4" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="456" y="73" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B26" text-anchor="middle">Tech notified</text>
<line x1="506" y1="68" x2="530" y2="68" stroke="#B8B5AE" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="532" y="46" width="100" height="44" rx="4" fill="#F7F6F4" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="582" y="73" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B26" text-anchor="middle">Resolved</text>
<rect x="16" y="132" width="316" height="252" rx="5" fill="#FFFFFF" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="28" y="150" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#8C8980" font-weight="500">Research insights</text>
<rect x="32" y="158" width="134" height="92" rx="3" fill="#FFF176"/>
<text x="44" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B22" font-weight="500">Phone dispatch</text>
<text x="44" y="192" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#4A4836">No audit trail for</text>
<text x="44" y="207" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#4A4836">assignments</text>
<circle cx="155" cy="239" r="7" fill="#E6B800"/>
<text x="155" y="243" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">OP</text>
<rect x="180" y="158" width="134" height="92" rx="3" fill="#FFF176"/>
<text x="192" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2D2B22" font-weight="500">No field status</text>
<text x="192" y="192" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#4A4836">Can't see who's</text>
<text x="192" y="207" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#4A4836">available nearby</text>
<circle cx="303" cy="239" r="7" fill="#E6B800"/>
<text x="303" y="243" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">PM</text>
<rect x="32" y="264" width="134" height="92" rx="3" fill="#FFCCBC"/>
<text x="44" y="282" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#3B2018" font-weight="500">Assign conflicts</text>
<text x="44" y="298" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#5C3530">Same alert sent to</text>
<text x="44" y="313" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#5C3530">multiple techs</text>
<rect x="180" y="264" width="134" height="92" rx="3" fill="#FFCCBC"/>
<text x="192" y="282" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#3B2018" font-weight="500">Missed alerts</text>
<text x="192" y="298" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#5C3530">Techs miss notifs</text>
<text x="192" y="313" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#5C3530">while in transit</text>
<rect x="348" y="132" width="316" height="252" rx="5" fill="#FFFFFF" stroke="#DDDBD6" stroke-width="0.75"/>
<text x="360" y="150" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#8C8980" font-weight="500">Design decisions</text>
<rect x="364" y="158" width="134" height="92" rx="3" fill="#B5EAD7"/>
<text x="376" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A3D2E" font-weight="500">Modal over map</text>
<text x="376" y="192" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2E5C48">Keeps map visible</text>
<text x="376" y="207" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2E5C48">during assignment</text>
<circle cx="487" cy="239" r="7" fill="#34C78A"/>
<text x="487" y="243" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">UX</text>
<rect x="512" y="158" width="134" height="92" rx="3" fill="#B5EAD7"/>
<text x="524" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A3D2E" font-weight="500">Multi-assign</text>
<text x="524" y="192" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2E5C48">Select multiple</text>
<text x="524" y="207" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#2E5C48">in one action</text>
<rect x="364" y="264" width="134" height="92" rx="3" fill="#BAE6FD"/>
<text x="376" y="282" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#0F2D42" font-weight="500">Decline + reason</text>
<text x="376" y="298" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A4060">Honest feedback</text>
<text x="376" y="313" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A4060">loop for operators</text>
<circle cx="487" cy="345" r="7" fill="#38BDF8"/>
<text x="487" y="349" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">UX</text>
<rect x="512" y="264" width="134" height="92" rx="3" fill="#BAE6FD"/>
<text x="524" y="282" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#0F2D42" font-weight="500">Undo toast</text>
<text x="524" y="298" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A4060">Skip confirm dialog</text>
<text x="524" y="313" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#1A4060">faster to resolve</text>
</svg>
