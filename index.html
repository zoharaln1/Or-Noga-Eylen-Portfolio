<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Or Noga — Product Designer</title>
  <meta name="description" content="Senior Product Designer with 6 years of experience leading end-to-end design across B2C, B2B, and enterprise products — UX research, design systems, and developer handoff." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta property="og:title" content="Or Noga — Senior Product Designer" />
  <meta property="og:description" content="Senior Product Designer with 6 years of experience leading end-to-end design across B2C, B2B, and enterprise products — UX research, design systems, and developer handoff." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1A4FFF;
      --blue-dark: #0E35CC;
      --blue-light: #EBF0FF;
      --ink: #0C1A35;
      --muted: #5B6E8A;
      --border: #D8E0F5;
      --bg: #F5F7FF;
      --card: #FFFFFF;
      --t: 0.3s cubic-bezier(.4,0,.2,1);
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gate-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(26,79,255,.08);
    }
    .gate-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--blue);
      margin-bottom: 28px;
    }
    .gate-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }
    .gate-sub {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .gate-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 14px;
      outline: none;
      transition: border-color var(--t);
    }
    .gate-input:focus { border-color: var(--blue); }
    .gate-btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--t);
    }
    .gate-btn:hover { background: var(--blue-dark); }
    .gate-error {
      color: #D03050;
      font-size: 0.85rem;
      margin-top: 14px;
      min-height: 1em;
    }
  </style>
</head>
<body>

  <div class="gate-card">
    <div class="gate-logo">Or Noga Eylen</div>
    <div class="gate-title">This portfolio is private</div>
    <p class="gate-sub">Enter the password to view it.</p>
    <form id="gateForm">
      <input type="password" id="gatePassword" class="gate-input" placeholder="Password" autofocus />
      <button type="submit" class="gate-btn">Enter</button>
      <div class="gate-error" id="gateError"></div>
    </form>
  </div>

  <script>
    const SITE_PASSWORD = '12123';
    document.getElementById('gateForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const entered = document.getElementById('gatePassword').value;
      if (entered === SITE_PASSWORD) {
        localStorage.setItem('portfolioAuthTime', Date.now().toString());
        window.location.href = 'home.html';
      } else {
        document.getElementById('gateError').textContent = 'Incorrect password. Try again.';
        document.getElementById('gatePassword').value = '';
        document.getElementById('gatePassword').focus();
      }
    });
  </script>

</body>
</html>
